<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Table from Google Sheets</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      text-align: center;
      margin: 20px;
      background-color: #eef2f7;
    }
    h1 {
      color: #333;
      font-weight: 600;
    }
    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
      transition: 0.3s;
    }
    .container:hover {
      box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.1);
      background: white;
    }
    th, td {
      padding: 14px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 16px;
    }
    th {
      background-color: #007bff;
      color: white;
      text-transform: uppercase;
    }
    tr:nth-child(even) {
      background-color: #f8f9fc;
    }
    tr:hover {
      background-color: #dde6f1;
      transition: 0.3s;
    }
    .loading {
      font-size: 18px;
      font-weight: 500;
      color: #007bff;
      margin-top: 20px;
    }
  </style>
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyh8cJsYJqC3SpJPNX4042uhqZkJPtJNq-FaLdBmS1vBLjin41qOCcCGYqRX5Zwow-6AA/exec"; // Replace with your Web App URL

    async function loadTable() {
      try {
        let response = await fetch(WEB_APP_URL);
        let data = await response.json();
        renderTable(data);
      } catch (error) {
        console.error("Error loading data:", error);
        document.getElementById("table-container").innerHTML = "<p style='color: red;'>Failed to load data. Please try again.</p>";
      }
    }

    function renderTable(data) {
      const tableContainer = document.getElementById("table-container");
      tableContainer.innerHTML = ""; // Clear old content

      let tableHTML = "<table><thead><tr>";
      data[0].forEach(header => {
        tableHTML += `<th>${header}</th>`;
      });
      tableHTML += "</tr></thead><tbody>";

      for (let i = 1; i < data.length; i++) {
        tableHTML += "<tr>";
        data[i].forEach(cell => {
          tableHTML += `<td>${cell}</td>`;
        });
        tableHTML += "</tr>";
      }

      tableHTML += "</tbody></table>";
      tableContainer.innerHTML = tableHTML;
    }

    window.onload = loadTable;
  </script>
</head>
<body>
  <div class="container">
    <h1>Dynamic Table from Google Sheets</h1>
    <div id="table-container" class="loading">Loading table...</div>
  </div>
</body>
</html>
